tasks:
  pdf-reader:
    solution: smolagents-claude-v2
    description: smolagents CodeAgent with PDF vision tool + Python interpreter
    cmd: uv run python solution.py
    traptask: ../trapstreet-tasks/tasks/pdf_reader
    # Agent loops multiple LLM calls per case (1 vision read + N planning steps);
    # bump well above claude-pdf's 600 to absorb retries on long scenario questions.
    timeout: 1200
    file_outputs:
      - usage.json           # token counts (split by tool vs planning) + cost estimate
    metadata:
      # Engine label for the leaderboard: model + framework, since this row's
      # whole point is comparing the agent-loop architecture against direct
      # vision (claude-pdf) and preprocessing (docling-claude) using the same
      # underlying model. Override if you change the MODEL env var.
      engine: claude-opus-4-7 + smolagents
